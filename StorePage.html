<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Lolos Shop</title>
</head>
<body>
    <div class="container">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
            <h2 class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">Lolos</h2>
          <ul class="nav nav-pills">
            <li class="nav-item"><a href="http://127.0.0.1:5500/TrolleyPage.html" class="btn btn-secondary my-2" aria-current="page">Carrito</a></li>
          </ul>
        </header>
      </div>
    
      <section class="py-5 text-center container">
        <div class="row py-lg-5">
          <div class="col-lg-6 col-md-8 mx-auto">
            <h1 class="fw-light">!Bienvenido a Lolos¡</h1>
            <p class="lead text-muted">Porque verte bien es un arte.</p>
            <p>
              <a href="#" class="btn btn-secondary my-2">Hombre</a>
              <a href="#" class="btn btn-secondary my-2">Mujer</a>
            </p>
          </div>
        </div>
      </section>

<!--Cabezeras-->
      <div class="album py-5 bg-light">
        <div class="container">
          <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
<!--Cartas de producto-->
            <!---->
            <!--Trajeta de producto-->
            <div class="col">
             <div class="card shadow-sm">
              <img src="..." class="card-img-top" alt="No hay imagen xd">
              <div class="card-body">
                <!--Texto para descripción de la prenda-->
                <p class="card-text">Aca va la información sobre la prenda.</p>
                <!--Texto del precio de la prenda-->
                <small class="text-muted">€ 0,00</small>
                <div class="d-flex justify-content-between align-items-center">
                  <!--Boton para agregar al carrito de compras-->
                  <div class="btn-group">
                    <button type="button" class="btn btn-sm btn-outline-secondary">Agregar</button>
                  </div>
                  <!--Grupo de botones para la talla de la prenda-->
                  <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                    <!--Botones correspondiente a cada talla-->
                    <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked>
                    <label class="btn btn-sm btn-outline-secondary" for="btnradio1">S</label>
                  
                    <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off">
                    <label class="btn btn-sm btn-outline-secondary" for="btnradio2">M</label>
                  
                    <input type="radio" class="btn-check" name="btnradio" id="btnradio3" autocomplete="off">
                    <label class="btn btn-sm btn-outline-secondary" for="btnradio3">L</label>

                    <input type="radio" class="btn-check" name="btnradio" id="btnradio4" autocomplete="off">
                    <label class="btn btn-sm btn-outline-secondary" for="btnradio4">XL</label>
                  </div>
                  <!--Fin del grupo de botones de talla-->
                </div>
              </div>
             </div>
            </div><!--Fin de tarjeta-->

          
<!--Termina los recuadros de producto-->
<!-- Div de cierre, cabezeras-->
          </div>
        </div>
      </div>
</body>
</html>
